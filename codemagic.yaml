workflows:
  vs_xode:
    name: VS-Xode

    environment:
      node: 20

    scripts:
      - name: Disable Git LFS (IMPORTANT FIX)
        script: |
          git lfs install --skip-smudge
          export GIT_LFS_SKIP_SMUDGE=1

      - name: Install dependencies
        script: |
          npm ci || npm install

      - name: Compile
        script: |
          npm run compile || true

    artifacts:
      - out/**
